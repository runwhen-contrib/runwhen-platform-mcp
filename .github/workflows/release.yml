name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # Push/merge to main (this workflow) is not gated by GitHub "Releases"; it runs on every
  # main branch update. Same path set as docker.yaml PR builds — skips Docker publish when
  # the merge only touches files outside the image (e.g. README.md). PyPI uses pypi.yaml separately.
  docker-relevant-changes:
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - 'runwhen_platform_mcp/**'
              - 'requirements.txt'
              - 'pyproject.toml'
              - 'Dockerfile'
              - '.github/workflows/docker.yaml'

  release:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.create.outputs.release_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create Release
        id: create
        uses: runwhen-contrib/github-actions/generate-release@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: [release, docker-relevant-changes]
    if: >
      needs.release.result == 'success' &&
      needs.release.outputs.release_tag != '' &&
      (needs.docker-relevant-changes.outputs.any == 'true' || github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/docker.yaml
    with:
      release_tag: ${{ needs.release.outputs.release_tag }}
    secrets: inherit

  notify:
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: always()
    steps:
      - name: Notify Slack of release
        if: needs.release.result == 'success'
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "#notifications"
            text: "Released ${{ github.repository }} ${{ needs.release.outputs.release_tag }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ":rocket: *Released* `${{ needs.release.outputs.release_tag }}` — <${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.release.outputs.release_tag }}|View Release>"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Repo:*\n${{ github.repository }}"
                  - type: mrkdwn
                    text: "*Triggered by:*\n${{ github.actor }}"

      - name: Notify Slack of failure
        if: needs.release.result == 'failure'
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "#notifications"
            text: "Release failed for ${{ github.repository }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ":x: *Release failed* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
