name: Docker

on:
  release:
    types: [published]
  pull_request:
    branches:
      - main
    paths:
      - 'runwhen_platform_mcp/**'
      - 'requirements.txt'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/docker.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'release'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event.release.tag_name }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=ref,event=pr,suffix=-${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref }}

  notify:
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.event_name == 'release'
    steps:
      - name: Notify Slack of container push
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "#notifications"
            text: "Pushed runwhen-platform-mcp image"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ":whale: *Pushed runwhen-platform-mcp* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Release:*\n`${{ github.event.release.tag_name }}`"
                  - type: mrkdwn
                    text: "*Image:*\n`ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}`"
