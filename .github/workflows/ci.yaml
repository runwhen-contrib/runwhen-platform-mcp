name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Type check
        run: mypy runwhen_platform_mcp/

      - name: Tests
        run: pytest tests/ -v --tb=short

  notify-failure:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: failure() && github.ref == 'refs/heads/main'
    steps:
      - name: Notify Slack of CI failure
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "#notifications"
            text: "CI failed on main for ${{ github.repository }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: ":x: *CI Failed* on `main` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
              - type: section
                fields:
                  - type: mrkdwn
                    text: "*Repo:*\n${{ github.repository }}"
                  - type: mrkdwn
                    text: "*Commit:*\n`${{ github.sha }}`"
