apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: backend-services
  labels:
    app: mcp-server
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: mcp
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: mcp-server
