apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: backend-services
  labels:
    app: mcp-server
    app.kubernetes.io/name: mcp-server
    app.kubernetes.io/component: mcp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
        app.kubernetes.io/name: mcp-server
        app.kubernetes.io/component: mcp
    spec:
      containers:
        - name: mcp-server
          image: runwhen/runwhen-platform-mcp:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: MCP_TRANSPORT
              value: "http"
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8000"
            - name: FASTMCP_STATELESS_HTTP
              value: "true"
            - name: RW_API_URL
              valueFrom:
                configMapKeyRef:
                  name: papi-env-vars-cm
                  key: PAPI_PUBLIC_URL
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
